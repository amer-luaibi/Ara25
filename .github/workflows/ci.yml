name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e .
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Audit synthetic schema example
        run: python scripts/audit_dataset.py data/sample/synthetic_sample.jsonl